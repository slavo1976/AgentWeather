name: Weather Agent

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni repozitár
        run: |
          git clone https://x-access-token:${{ secrets.WEATHER_TOKEN }}@github.com/slavo1976/AgentWeather.git .

      - name: Inštalácia knižníc
        run: pip install requests openpyxl PyGithub

      - name: Spusti agenta
        env:
          GITHUB_TOKEN: ${{ secrets.WEATHER_TOKEN }}
          GITHUB_USER: slavo1976
        run: python weather_agent.py 2>&1 | tee agent_output.txt

      - name: Odošli email
        if: always()
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          GITHUB_TOKEN: ${{ secrets.WEATHER_TOKEN }}
          STATUS: ${{ job.status }}
        run: python send_email.py
